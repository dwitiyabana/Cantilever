<!DOCTYPE html>
<html>

<head>

    <title>AI Chatbot</title>

    <style>

        body{

            background:#f2f2f2;
            font-family:Arial;
        }

        .container{

            width:500px;
            margin:60px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;

        }

        h2{

            text-align:center;

        }

        input{

            width:75%;
            padding:10px;
            font-size:16px;

        }

        button{

            padding:10px 15px;
            font-size:16px;
            cursor:pointer;

        }

        .reply{

            margin-top:20px;
            padding:15px;
            background:#eeeeee;
            border-radius:8px;

        }

    </style>

</head>

<body>

<div class="container">

<h2>AI Chatbot</h2>

<form method="POST">

<input
type="text"
name="message"
placeholder="Enter your message"
required>

<button type="submit">

Send

</button>

</form>

{% if reply %}

<div class="reply">

<b>Bot:</b>

{{reply}}

</div>

{% endif %}

</div>

</body>

</html>
